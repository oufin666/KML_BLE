<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KML与压缩文件对比工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        h1 {
            color: #333;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="file"] {
            margin: 10px 0;
        }
        button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover {
            background-color: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0f8ff;
            border: 1px solid #add8e6;
            border-radius: 4px;
        }
        .file-info {
            margin: 10px 0;
            padding: 10px;
            background-color: #e8f4f8;
            border: 1px solid #b8e0f0;
            border-radius: 4px;
        }
        .compare-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error {
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info {
            background-color: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        .hex-view {
            font-family: monospace;
            white-space: pre;
            background-color: #f8f9fa;
            padding: 10px;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            max-height: 200px;
            overflow-y: auto;
        }
        .progress {
            margin: 10px 0;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>KML与压缩文件对比工具</h1>
        
        <div class="form-group">
            <label for="kmlFile">上传KML文件：</label>
            <input type="file" id="kmlFile" accept=".kml">
            <div id="kmlFileInfo" class="file-info" style="display: none;"></div>
        </div>
        
        <div class="form-group">
            <label for="compressedFile">上传压缩文件：</label>
            <input type="file" id="compressedFile" accept=".bin,.dat">
            <div id="compressedFileInfo" class="file-info" style="display: none;"></div>
        </div>
        
        <button onclick="compareFiles()">开始对比</button>
        <button onclick="clearResults()">清空结果</button>
        
        <div class="result" id="result" style="display: none;">
            <h3>对比结果：</h3>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        // 解析KML内容，提取点和线数据
        function parseKmlContent(text) {
            const points = [];
            const lines = [];
            
            // 提取Point数据
            const pointRegex = /<Point[\s\S]*?<coordinates>([\s\S]*?)<\/coordinates>[\s\S]*?<\/Point>/g;
            let match;
            while ((match = pointRegex.exec(text)) !== null) {
                const coordData = match[1].trim();
                const point = parseCoordinate(coordData);
                if (point) {
                    points.push(point);
                }
            }
            
            // 提取LineString数据
            const lineRegex = /<LineString[\s\S]*?<coordinates>([\s\S]*?)<\/coordinates>[\s\S]*?<\/LineString>/g;
            while ((match = lineRegex.exec(text)) !== null) {
                const coordData = match[1].trim();
                const linePoints = parseCoordinates(coordData);
                if (linePoints.length > 0) {
                    lines.push({ points: linePoints });
                }
            }
            
            return { points, lines };
        }

        // 解析单个坐标
        function parseCoordinate(coordData) {
            const parts = coordData.split(',');
            if (parts.length >= 2) {
                const lon = parseFloat(parts[0]);
                const lat = parseFloat(parts[1]);
                const alt = parts.length >= 3 ? parseFloat(parts[2]) : 0;
                
                if (!isNaN(lon) && !isNaN(lat)) {
                    return { lon, lat, alt: isNaN(alt) ? 0 : alt };
                }
            }
            return null;
        }

        // 解析多个坐标
        function parseCoordinates(coordData) {
            const result = [];
            const coords = coordData.split(/\s+/).filter(c => c.length > 0);
            
            for (const coord of coords) {
                const point = parseCoordinate(coord);
                if (point) {
                    result.push(point);
                }
            }
            
            return result;
        }

        // 写入GeoPoint数据
        function writeGeoPoint(buffer, offset, point) {
            const view = new DataView(new ArrayBuffer(12));
            view.setFloat32(0, point.lon, true);
            view.setFloat32(4, point.lat, true);
            view.setFloat32(8, point.alt, true);
            
            const uint8View = new Uint8Array(view.buffer);
            for (let i = 0; i < 12; i++) {
                buffer[offset + i] = uint8View[i];
            }
        }

        // 写入Uint32数据
        function writeUint32(buffer, offset, value) {
            const view = new DataView(new ArrayBuffer(4));
            view.setUint32(0, value, true);
            const uint8View = new Uint8Array(view.buffer);
            for (let i = 0; i < 4; i++) {
                buffer[offset + i] = uint8View[i];
            }
        }

        // 生成与PC端兼容的二进制数据
        function generateBinaryData(points, lines, compress = false) {
            // 计算总大小
            let totalSize = 0;
            
            // 线数据大小：总段数(4字节) + 每段点数(4字节) + 每段点数据
            totalSize += 4; // 总段数
            for (const line of lines) {
                totalSize += 4; // 段点数
                if (compress) {
                    totalSize += 12 + line.points.length * 9;
                } else {
                    totalSize += line.points.length * 12;
                }
            }
            
            // 分配缓冲区
            const buffer = new Uint8Array(totalSize);
            let offset = 0;
            
            // 写入线数据
            const totalSegments = lines.length;
            writeUint32(buffer, offset, totalSegments);
            offset += 4;
            
            for (const line of lines) {
                const pointCount = line.points.length;
                writeUint32(buffer, offset, pointCount);
                offset += 4;
                
                if (compress) {
                    const compressedData = compressPoints(line.points);
                    buffer.set(compressedData, offset);
                    offset += compressedData.length;
                } else {
                    // 非压缩模式（使用int32格式，与压缩模式保持一致）
                    for (const point of line.points) {
                        const lonInt = floatToInt32(point.lon);
                        const latInt = floatToInt32(point.lat);
                        const altInt = floatToInt32(point.alt);
                        
                        writeInt32(buffer, offset, lonInt);
                        offset += 4;
                        writeInt32(buffer, offset, latInt);
                        offset += 4;
                        writeInt32(buffer, offset, altInt);
                        offset += 4;
                    }
                }
            }
            
            // 裁剪到实际大小
            return buffer.slice(0, offset);
        }

        // float转int32函数
        function floatToInt32(value) {
            return Math.round(value * 1000000);
        }

        // int32转float函数
        function int32ToFloat(value) {
            return value / 1000000;
        }

        // 编码差值为字节
        function encodeDelta(delta) {
            const result = [];
            
            // 处理符号
            const sign = delta < 0 ? 1 : 0;
            let absDelta = Math.abs(delta);
            
            // 第一个字节：6位数据 + 1位符号 + 1位继续标志
            let firstByte = absDelta & 0x3F; // 取低6位
            absDelta >>= 6;
            
            if (absDelta > 0) {
                firstByte |= 0x80; // 设置继续位
            }
            
            if (sign > 0) {
                firstByte |= 0x40; // 设置符号位
            }
            
            result.push(firstByte);
            
            // 后续字节：每字节7位数据 + 1位继续标志
            while (absDelta > 0) {
                let byte = absDelta & 0x7F; // 取低7位
                absDelta >>= 7;
                
                if (absDelta > 0) {
                    byte |= 0x80; // 设置继续位
                }
                
                result.push(byte);
            }
            
            return result;
        }

        // 解码字节为差值
        function decodeDelta(bytes) {
            let result = 0;
            let sign = 0;
            let shift = 0;
            
            for (let i = 0; i < bytes.length; i++) {
                const byte = bytes[i];
                
                // 提取符号位（仅第一个字节）
                if (i === 0) {
                    sign = (byte & 0x40) >> 6;
                }
                
                // 提取数据位
                const dataBits = i === 0 ? (byte & 0x3F) : (byte & 0x7F);
                
                // 按位累加（低位优先）
                result |= (dataBits << shift);
                shift += (i === 0 ? 6 : 7);
                
                // 检查是否结束
                if ((byte & 0x80) === 0) {
                    break;
                }
            }
            
            // 应用符号
            return sign === 1 ? -result : result;
        }

        // 压缩点数据
        function compressPoints(points) {
            if (points.length === 0) {
                return new Uint8Array(0);
            }
            
            // 计算压缩后的数据大小（估算）
            const estimatedSize = 12 + points.length * 9;
            const buffer = new Uint8Array(estimatedSize);
            let offset = 0;
            
            // 写入第一个点的原始数据
            const firstPoint = points[0];
            const firstLonInt = floatToInt32(firstPoint.lon);
            const firstLatInt = floatToInt32(firstPoint.lat);
            const firstAltInt = floatToInt32(firstPoint.alt);
            
            writeInt32(buffer, offset, firstLonInt);
            offset += 4;
            writeInt32(buffer, offset, firstLatInt);
            offset += 4;
            writeInt32(buffer, offset, firstAltInt);
            offset += 4;
            
            // 压缩后续点
            let prevLonInt = firstLonInt;
            let prevLatInt = firstLatInt;
            let prevAltInt = firstAltInt;
            
            for (let i = 1; i < points.length; i++) {
                const point = points[i];
                const lonInt = floatToInt32(point.lon);
                const latInt = floatToInt32(point.lat);
                const altInt = floatToInt32(point.alt);
                
                // 计算差值
                const deltaLon = lonInt - prevLonInt;
                const deltaLat = latInt - prevLatInt;
                const deltaAlt = altInt - prevAltInt;
                
                // 编码差值
                const encodedLon = encodeDelta(deltaLon);
                const encodedLat = encodeDelta(deltaLat);
                const encodedAlt = encodeDelta(deltaAlt);
                
                // 写入编码后的数据
                for (const byte of encodedLon) {
                    buffer[offset++] = byte;
                }
                for (const byte of encodedLat) {
                    buffer[offset++] = byte;
                }
                for (const byte of encodedAlt) {
                    buffer[offset++] = byte;
                }
                
                // 更新前一个点
                prevLonInt = lonInt;
                prevLatInt = latInt;
                prevAltInt = altInt;
            }
            
            // 裁剪到实际大小
            return buffer.slice(0, offset);
        }

        // 解压点数据
        function decompressPoints(compressedData, pointCount) {
            const points = [];
            if (pointCount === 0 || compressedData.length === 0) {
                return points;
            }
            
            let offset = 0;
            
            // 读取第一个点
            const firstLonInt = readInt32(compressedData, offset);
            offset += 4;
            const firstLatInt = readInt32(compressedData, offset);
            offset += 4;
            const firstAltInt = readInt32(compressedData, offset);
            offset += 4;
            
            points.push({
                lon: int32ToFloat(firstLonInt),
                lat: int32ToFloat(firstLatInt),
                alt: int32ToFloat(firstAltInt)
            });
            
            // 解压后续点
            let prevLonInt = firstLonInt;
            let prevLatInt = firstLatInt;
            let prevAltInt = firstAltInt;
            
            for (let i = 1; i < pointCount; i++) {
                // 解码经度差值
                const lonBytes = [];
                while (offset < compressedData.length) {
                    const byte = compressedData[offset++];
                    lonBytes.push(byte);
                    if ((byte & 0x80) === 0) {
                        break;
                    }
                }
                const deltaLon = decodeDelta(lonBytes);
                
                // 解码纬度差值
                const latBytes = [];
                while (offset < compressedData.length) {
                    const byte = compressedData[offset++];
                    latBytes.push(byte);
                    if ((byte & 0x80) === 0) {
                        break;
                    }
                }
                const deltaLat = decodeDelta(latBytes);
                
                // 解码海拔差值
                const altBytes = [];
                while (offset < compressedData.length) {
                    const byte = compressedData[offset++];
                    altBytes.push(byte);
                    if ((byte & 0x80) === 0) {
                        break;
                    }
                }
                const deltaAlt = decodeDelta(altBytes);
                
                // 计算当前点
                const currentLonInt = prevLonInt + deltaLon;
                const currentLatInt = prevLatInt + deltaLat;
                const currentAltInt = prevAltInt + deltaAlt;
                
                points.push({
                    lon: int32ToFloat(currentLonInt),
                    lat: int32ToFloat(currentLatInt),
                    alt: int32ToFloat(currentAltInt)
                });
                
                // 更新前一个点
                prevLonInt = currentLonInt;
                prevLatInt = currentLatInt;
                prevAltInt = currentAltInt;
            }
            
            return points;
        }

        // 写入Int32数据
        function writeInt32(buffer, offset, value) {
            const view = new DataView(new ArrayBuffer(4));
            view.setInt32(0, value, true);
            const uint8View = new Uint8Array(view.buffer);
            for (let i = 0; i < 4; i++) {
                buffer[offset + i] = uint8View[i];
            }
        }

        // 读取Int32数据
        function readInt32(buffer, offset) {
            const view = new DataView(new ArrayBuffer(4));
            for (let i = 0; i < 4; i++) {
                view.setUint8(i, buffer[offset + i]);
            }
            return view.getInt32(0, true);
        }

        // 读取Uint32数据
        function readUint32(buffer, offset) {
            const view = new DataView(new ArrayBuffer(4));
            for (let i = 0; i < 4; i++) {
                view.setUint8(i, buffer[offset + i]);
            }
            return view.getUint32(0, true);
        }

        // 读取Float32数据
        function readFloat32(buffer, offset) {
            const view = new DataView(new ArrayBuffer(4));
            for (let i = 0; i < 4; i++) {
                view.setUint8(i, buffer[offset + i]);
            }
            return view.getFloat32(0, true);
        }

        // 解压压缩后的bin文件
        function decompress(compressedBuffer) {
            const view = new Uint8Array(compressedBuffer);
            let offset = 0;
            
            // 读取总段数
            const totalSegments = readUint32(view, offset);
            offset += 4;
            
            // 计算解压后的数据大小
            let totalPoints = 0;
            const segmentOffsets = [];
            const segmentPointCounts = [];
            
            // 先读取所有段的点数
            for (let i = 0; i < totalSegments; i++) {
                segmentOffsets.push(offset);
                const pointCount = readUint32(view, offset);
                segmentPointCounts.push(pointCount);
                totalPoints += pointCount;
                offset += 4;
            }
            
            // 计算解压后的数据大小
            const decompressedSize = 4 + totalSegments * 4 + totalPoints * 12;
            const decompressedBuffer = new Uint8Array(decompressedSize);
            let decompressedOffset = 0;
            
            // 写入总段数
            writeUint32(decompressedBuffer, decompressedOffset, totalSegments);
            decompressedOffset += 4;
            
            // 解压每一段
            for (let i = 0; i < totalSegments; i++) {
                const pointCount = segmentPointCounts[i];
                const segmentStart = segmentOffsets[i] + 4;
                
                // 写入段点数
                writeUint32(decompressedBuffer, decompressedOffset, pointCount);
                decompressedOffset += 4;
                
                // 提取当前段的压缩数据
                let segmentEnd = i < totalSegments - 1 ? segmentOffsets[i + 1] : view.length;
                const segmentData = view.slice(segmentStart, segmentEnd);
                
                // 解压点数据
                const points = decompressPoints(segmentData, pointCount);
                
                // 写入解压后的点数据（使用int32格式，与原文件一致）
                for (const point of points) {
                    const lonInt = floatToInt32(point.lon);
                    const latInt = floatToInt32(point.lat);
                    const altInt = floatToInt32(point.alt);
                    
                    writeInt32(decompressedBuffer, decompressedOffset, lonInt);
                    decompressedOffset += 4;
                    writeInt32(decompressedBuffer, decompressedOffset, latInt);
                    decompressedOffset += 4;
                    writeInt32(decompressedBuffer, decompressedOffset, altInt);
                    decompressedOffset += 4;
                }
            }
            
            return decompressedBuffer.buffer;
        }

        // 比较两个ArrayBuffer是否相等
        function compareBuffers(buffer1, buffer2) {
            if (buffer1.byteLength !== buffer2.byteLength) {
                return { equal: false, message: `长度不一致：${buffer1.byteLength} vs ${buffer2.byteLength}` };
            }
            
            const view1 = new Uint8Array(buffer1);
            const view2 = new Uint8Array(buffer2);
            
            for (let i = 0; i < view1.length; i++) {
                if (view1[i] !== view2[i]) {
                    return { 
                        equal: false, 
                        message: `第${i}字节不一致：0x${view1[i].toString(16).padStart(2, '0')} vs 0x${view2[i].toString(16).padStart(2, '0')}`
                    };
                }
            }
            
            return { equal: true, message: '内容完全一致' };
        }

        // 将KML转换为bin文件
        function convertKmlToBin(text) {
            const { points, lines } = parseKmlContent(text);
            const binaryData = generateBinaryData(points, lines, false);
            return binaryData.buffer;
        }

        // 对转换后的bin文件进行压缩
        function compressBinFile(binBuffer) {
            const view = new Uint8Array(binBuffer);
            let offset = 0;
            
            // 读取总段数
            const totalSegments = readUint32(view, offset);
            offset += 4;
            
            // 收集所有段的点数据和原始段点数
            const segments = [];
            
            for (let i = 0; i < totalSegments; i++) {
                const pointCount = readUint32(view, offset);
                offset += 4;
                
                const points = [];
                
                for (let j = 0; j < pointCount; j++) {
                    const lonInt = readInt32(view, offset);
                    offset += 4;
                    const latInt = readInt32(view, offset);
                    offset += 4;
                    const altInt = readInt32(view, offset);
                    offset += 4;
                    
                    // 转换为浮点数
                    const lon = int32ToFloat(lonInt);
                    const lat = int32ToFloat(latInt);
                    const alt = int32ToFloat(altInt);
                    
                    points.push({ lon, lat, alt });
                }
                
                segments.push({ pointCount, points });
            }
            
            // 计算压缩后的数据大小
            let totalSize = 4; // 总段数
            for (const segment of segments) {
                totalSize += 4; // 段点数
                totalSize += 12 + segment.points.length * 9; // 估算压缩后的大小
            }
            
            // 分配缓冲区
            const compressedBuffer = new Uint8Array(totalSize);
            let compressedOffset = 0;
            
            // 写入总段数
            writeUint32(compressedBuffer, compressedOffset, totalSegments);
            compressedOffset += 4;
            
            // 压缩每一段
            for (const segment of segments) {
                // 写入原始段点数，保持与原文件一致
                writeUint32(compressedBuffer, compressedOffset, segment.pointCount);
                compressedOffset += 4;
                
                // 压缩点数据
                const pointsCompressed = compressPoints(segment.points);
                compressedBuffer.set(pointsCompressed, compressedOffset);
                compressedOffset += pointsCompressed.length;
            }
            
            // 裁剪到实际大小
            return compressedBuffer.slice(0, compressedOffset).buffer;
        }

        // 读取文件内容
        function readFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error('读取文件失败'));
                reader.readAsText(file);
            });
        }

        // 读取二进制文件
        function readBinaryFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.onerror = (e) => reject(new Error('读取文件失败'));
                reader.readAsArrayBuffer(file);
            });
        }

        // 显示文件信息
        function showFileInfo(file, infoElementId) {
            const infoElement = document.getElementById(infoElementId);
            infoElement.innerHTML = `
                <p>文件名: ${file.name}</p>
                <p>文件大小: ${(file.size / 1024).toFixed(2)} KB</p>
                <p>类型: ${file.type || '未知'}</p>
            `;
            infoElement.style.display = 'block';
        }

        // 显示对比结果
        function showResult(content) {
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            resultContent.innerHTML = content;
            resultDiv.style.display = 'block';
        }

        // 生成十六进制预览
        function generateHexPreview(buffer, maxBytes = 64) {
            const view = new Uint8Array(buffer);
            const bytes = Array.from(view.slice(0, maxBytes));
            return bytes.map(b => b.toString(16).padStart(2, '0')).join(' ');
        }

        // 开始对比
        async function compareFiles() {
            const kmlFileInput = document.getElementById('kmlFile');
            const compressedFileInput = document.getElementById('compressedFile');
            
            const kmlFile = kmlFileInput.files[0];
            const compressedFile = compressedFileInput.files[0];
            
            if (!kmlFile || !compressedFile) {
                showResult('<p style="color: red;">请上传KML文件和压缩文件</p>');
                return;
            }
            
            try {
                showResult('<div class="progress">正在处理文件...</div>');
                
                // 读取KML文件
                const kmlContent = await readFile(kmlFile);
                
                // 读取压缩文件
                const compressedBuffer = await readBinaryFile(compressedFile);
                
                // 1. KML转换为bin文件
                const kmlBinBuffer = convertKmlToBin(kmlContent);
                
                // 2. 压缩文件解压
                const decompressedBuffer = decompress(compressedBuffer);
                
                // 3. 对比：压缩文件解压后与KML转换的bin文件
                const compareResult1 = compareBuffers(decompressedBuffer, kmlBinBuffer);
                
                // 4. KML转换后再压缩
                const recompressedBuffer = compressBinFile(kmlBinBuffer);
                
                // 5. 对比：压缩文件与重新压缩的文件
                const compareResult2 = compareBuffers(compressedBuffer, recompressedBuffer);
                
                // 生成结果HTML
                let resultHtml = `
                    <h4>文件信息：</h4>
                    <div class="file-info">
                        <p>KML文件: ${kmlFile.name} (${(kmlFile.size / 1024).toFixed(2)} KB)</p>
                        <p>压缩文件: ${compressedFile.name} (${(compressedFile.size / 1024).toFixed(2)} KB)</p>
                        <p>KML转换的bin文件: ${(kmlBinBuffer.byteLength / 1024).toFixed(2)} KB</p>
                        <p>压缩文件解压后: ${(decompressedBuffer.byteLength / 1024).toFixed(2)} KB</p>
                        <p>KML重新压缩后: ${(recompressedBuffer.byteLength / 1024).toFixed(2)} KB</p>
                    </div>
                    
                    <h4>对比结果：</h4>
                    <div class="compare-result ${compareResult1.equal ? 'success' : 'error'}">
                        <h5>1. 压缩文件解压后与KML转换的bin文件对比：</h5>
                        <p>${compareResult1.message}</p>
                    </div>
                    
                    <div class="compare-result ${compareResult2.equal ? 'success' : 'error'}">
                        <h5>2. 压缩文件与KML转换后再压缩的文件对比：</h5>
                        <p>${compareResult2.message}</p>
                    </div>
                `;
                
                // 添加十六进制预览
                resultHtml += `
                    <h4>数据预览：</h4>
                    <div class="info">
                        <h6>KML转换的bin文件前64字节：</h6>
                        <div class="hex-view">${generateHexPreview(kmlBinBuffer)}</div>
                    </div>
                    
                    <div class="info">
                        <h6>压缩文件解压后前64字节：</h6>
                        <div class="hex-view">${generateHexPreview(decompressedBuffer)}</div>
                    </div>
                    
                    <div class="info">
                        <h6>压缩文件前64字节：</h6>
                        <div class="hex-view">${generateHexPreview(compressedBuffer)}</div>
                    </div>
                    
                    <div class="info">
                        <h6>KML重新压缩后前64字节：</h6>
                        <div class="hex-view">${generateHexPreview(recompressedBuffer)}</div>
                    </div>
                `;
                
                showResult(resultHtml);
                
            } catch (error) {
                showResult(`<p style="color: red;">处理失败: ${error.message}</p>`);
            }
        }

        // 清空结果
        function clearResults() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'none';
        }

        // 文件选择事件
        document.getElementById('kmlFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                showFileInfo(file, 'kmlFileInfo');
            }
        });

        document.getElementById('compressedFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                showFileInfo(file, 'compressedFileInfo');
            }
        });
    </script>
</body>
</html>
